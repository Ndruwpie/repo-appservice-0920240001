<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - PraktikumSubmit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            background: #f0f0ff;
        }

        .left-panel {
            width: 45%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px 60px;
        }

        .logo-circle {
            width: 50px;
            height: 50px;
            border: 2px solid #a78bfa;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        h2 {
            color: #7c6bb0;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            width: 100%;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #666;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 15px;
            border: 1.5px solid #c4b5fd;
            border-radius: 8px;
            font-size: 14px;
            color: #555;
            outline: none;
            transition: 0.3s;
            background: white;
        }

        .form-group input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 8px rgba(124, 58, 237, 0.2);
        }

        .form-options {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
            color: #888;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .form-options a {
            color: #7c6bb0;
            text-decoration: none;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #a78bfa, #f87171);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(167, 139, 250, 0.5);
        }

        .divider {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .signup-link {
            font-size: 13px;
            color: #888;
            margin-top: 10px;
        }

        .signup-link a {
            color: #7c3aed;
            font-weight: 600;
            text-decoration: none;
        }

        /* RIGHT PANEL */
        .right-panel {
            width: 55%;
            background: linear-gradient(135deg, #a78bfa 0%, #c084fc 40%, #f87171 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .right-panel::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-30%, -50%);
        }

        .right-panel::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            top: 10%;
            left: 10%;
        }

        .right-content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: left;
            max-width: 400px;
        }

        .right-content h1 {
            font-size: 52px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .right-content p {
            font-size: 14px;
            line-height: 1.7;
            opacity: 0.9;
            margin-bottom: 35px;
        }

        .btn-outline {
            display: inline-block;
            padding: 12px 28px;
            border: 2px solid white;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            background: rgba(255,255,255,0.15);
        }

        .btn-outline:hover {
            background: white;
            color: #7c3aed;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }

        .bubble-1 { width: 80px; height: 80px; bottom: 15%; right: 10%; }
        .bubble-2 { width: 40px; height: 40px; top: 15%; right: 25%; }
        .bubble-3 { width: 25px; height: 25px; bottom: 30%; left: 15%; }

        .error-msg {
            color: #f87171;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <div class="logo-circle"></div>
        <h2>Login Admin PraktikumSubmit</h2>

        <div id="errorMsg" class="error-msg" style="display:none"></div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Masukkan username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password">
        </div>

        <div class="form-options">
            <label>
                <input type="checkbox"> Remember me
            </label>
            <a href="#">Forgot password?</a>
        </div>

        <button class="btn-login" onclick="doLogin()">🔐 Log In</button>

        <p class="signup-link">
            Kembali ke <a href="/submit-task">Halaman Submit</a>
        </p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>

        <div class="right-content">
            <h1>Praktikum<br>Submit</h1>
            <p>
                Panel admin untuk mengelola dan memantau
                seluruh pengumpulan tugas praktikum mahasiswa
                berbasis Microsoft Azure Cloud Service.
            </p>
            <a href="/submit-task" class="btn-outline">📤 Submit Tugas</a>
        </div>
    </div>

    <script>
        function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (!username || !password) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = '⚠️ Username dan password harus diisi!';
                return;
            }

            // Simple admin check
            if (username === 'drupadi' && password === '123581321Dru!') {
                window.location.href = '/task-list';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = '❌ Username atau password salah!';
            }
        }

        // Login dengan Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>

</body>
</html>
